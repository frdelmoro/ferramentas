<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SheetApp – Minha Coleção</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  /* ── TEMAS ── */
  :root, [data-theme="dark"] {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --card-shadow: rgba(0,0,0,0.5);
    --border: #2a2a38;
    --accent: #e8b84b;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --modal-bg: rgba(5,5,10,0.92);
    --header-bg: rgba(10,10,15,0.88);
    --toolbar-bg: transparent;
    --radius: 10px;
    --sky: none;
  }

  [data-theme="light"] {
    --bg: #c9e8f7;
    --surface: #ffffff;
    --card: #ffffff;
    --card-shadow: rgba(60,100,150,0.14);
    --border: rgba(255,255,255,0.5);
    --accent: #1a6fb5;
    --text: #0d2040;
    --muted: #1a3a5c;
    --modal-bg: rgba(160,200,230,0.88);
    --header-bg: rgba(255,255,255,0.18);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    background-size: cover;
    background-attachment: fixed;
    background-position: center top;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    transition: background-color 0.4s, color 0.3s;
  }

  /* ── HEADER ── */
  header {
    background: var(--header-bg);
    padding: 18px 24px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    transition: background 0.4s;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  .logo span {
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0;
    display: block;
    margin-top: 2px;
    font-weight: 300;
  }

  /* ── BOTÃO TEMA ── */
  .theme-btn {
    margin-left: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 6px 14px 6px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--muted);
    transition: all 0.25s;
    white-space: nowrap;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
  .theme-btn .icon { font-size: 15px; line-height: 1; transition: transform 0.4s; }
  .theme-btn:hover .icon { transform: rotate(20deg); }

  /* ── TOGGLE GÊNEROS/COLEÇÕES (estilo claro/escuro) ── */
  .mode-toggle {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 3px;
    gap: 2px;
  }
  .mode-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
  }
  .mode-btn:hover { color: var(--accent); }
  .mode-btn.active { background: var(--accent); color: #fff; }
  [data-theme="dark"] .mode-btn.active { color: #000; }

  /* ── TABS ── */
  .tabs-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tabs-arrow {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    line-height: 1;
    margin-bottom: 6px;
    transition: all 0.2s;
  }
  .tabs-arrow:hover { border-color: var(--accent); color: var(--accent); }
  .tabs-arrow:disabled { opacity: 0.25; cursor: default; }
  .tabs-arrow:disabled:hover { border-color: var(--border); color: var(--muted); }

  .tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 6px 14px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    text-transform: uppercase;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: rgba(220,130,35,0.30); color: #f5a733; border-bottom-color: #f5a733; font-weight: 700; }

  /* Tabs como pílulas no tema claro */
  [data-theme="light"] .tab {
    color: #1a3a5c;
    font-weight: 600;
    background: rgba(255,255,255,0.42);
    border-radius: 20px;
    margin-bottom: 6px;
    border-bottom: 2px solid transparent;
    backdrop-filter: blur(4px);
  }
  [data-theme="light"] .tab:hover {
    background: rgba(255,255,255,0.62);
    color: #0d2a4a;
  }
  [data-theme="light"] .tab.active {
    background: rgba(230,140,40,0.82);
    color: #fff;
    border-bottom-color: transparent;
    font-weight: 700;
    text-shadow: 0 1px 3px rgba(0,0,0,0.25);
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 24px;
    flex-wrap: wrap;
  }

  .sort-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-right: 4px;
  }

  .sort-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    backdrop-filter: blur(6px);
  }
  .sort-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  [data-theme="dark"] .sort-btn.active { color: #000; }
  [data-theme="light"] .sort-btn {
    background: rgba(255,255,255,0.42);
    border-color: rgba(255,255,255,0.6);
    color: #1a3a5c;
    font-weight: 600;
    backdrop-filter: blur(4px);
  }
  [data-theme="light"] .sort-btn:hover {
    background: rgba(255,255,255,0.62);
    border-color: #1a6fb5;
    color: #1a6fb5;
  }
  [data-theme="light"] .sort-btn.active {
    background: #1a6fb5;
    border-color: #1a6fb5;
    color: #fff;
  }
  [data-theme="light"] .film-count { color: #1a3a5c; font-weight: 500; }
  [data-theme="light"] .sort-label { color: #1a3a5c; }

  .film-count { margin-left: auto; font-size: 12px; color: var(--muted); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 14px;
    padding: 16px 24px 40px;
  }
  @media (max-width: 1400px) { .grid { grid-template-columns: repeat(5, 1fr); } }
  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 860px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 580px)  { .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px 8px 40px; } }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid var(--border);
    position: relative;
    box-shadow: 0 4px 14px var(--card-shadow);
  }
  .card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 12px 32px var(--card-shadow), 0 0 0 1px var(--accent);
  }

  .card-img-wrap {
    position: relative;
    aspect-ratio: 2/3;
    background: var(--surface);
    overflow: hidden;
  }
  .card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }
  .card-img-wrap .no-img {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    color: var(--muted); font-size: 11px;
  }
  .card-img-wrap .no-img svg { opacity: 0.3; }

  .card-hdr {
    position: absolute; top: 0; left: 0; right: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.65) 0%, transparent 100%);
    padding: 8px;
    display: flex; gap: 4px; flex-wrap: wrap;
  }

  .badge {
    font-size: 9px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .badge-hdr  { background: rgba(200,150,0,0.55); color: #ffe066; border: 1px solid rgba(245,200,66,0.5); backdrop-filter: blur(4px); }
  .badge-hdr2 { background: rgba(30,110,200,0.50); color: #a8ddff; border: 1px solid rgba(96,200,255,0.45); backdrop-filter: blur(4px); }
  .badge-genero { background: rgba(120,120,130,0.55); color: #e8e8f0; border: 1px solid rgba(170,170,180,0.4); backdrop-filter: blur(4px); }

  .card-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);
    height: 60%;
    pointer-events: none;
  }


  .card-body { padding: 10px; }
  .card-title {
    font-size: 12px; font-weight: 500; color: var(--text);
    line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; min-height: 32px;
  }
  .card-title-original {
    font-size: 10px; font-style: italic; color: var(--muted);
    margin-top: 2px;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-year { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: var(--modal-bg);
    z-index: 500;
    align-items: center; justify-content: center;
    padding: 20px;
    backdrop-filter: blur(8px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    max-width: 720px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    position: relative;
    animation: modalIn 0.25s ease;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    backdrop-filter: blur(16px);
  }
  @keyframes modalIn { from { opacity:0; transform: scale(0.94) translateY(16px); } to { opacity:1; transform: scale(1) translateY(0); } }

  .modal-close {
    position: absolute; top: 14px; right: 14px;
    background: rgba(128,128,128,0.15);
    border: none; color: var(--text);
    width: 30px; height: 30px; border-radius: 50%;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; z-index: 10;
  }
  .modal-close:hover { background: rgba(128,128,128,0.3); }

  .modal-inner { display: flex; gap: 0; }

  .modal-poster {
    width: 200px; flex-shrink: 0;
    aspect-ratio: 2/3; object-fit: cover;
    border-radius: 14px 0 0 14px;
  }
  .modal-poster-placeholder {
    width: 200px; flex-shrink: 0;
    background: var(--card);
    border-radius: 14px 0 0 14px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
  }
  .modal-info {
    flex: 1; padding: 24px 24px 24px 22px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 1px; line-height: 1.1;
    color: var(--text); padding-right: 30px;
  }
  .modal-title-original {
    font-size: 14px; font-style: italic; color: var(--muted);
    margin-top: 2px;
  }
  .modal-meta { display: flex; flex-wrap: wrap; gap: 8px; }
  .meta-chip {
    font-size: 11px; padding: 4px 10px; border-radius: 20px;
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
  }
  .meta-chip strong { color: var(--text); }
  .meta-chip.colecao { border-color: var(--accent); color: var(--accent); cursor: pointer; }
  .meta-chip.colecao:hover { background: var(--accent); color: #fff; }
  .modal-sinopse {
    font-size: 13px; color: var(--muted); line-height: 1.65;
    border-left: 2px solid var(--accent); padding-left: 12px;
  }
  .modal-tech { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
  .tech-row { font-size: 11px; display: flex; gap: 6px; align-items: baseline; }
  .tech-row .k { color: var(--muted); min-width: 70px; }
  .tech-row .v { color: var(--text); font-weight: 500; }

  @media (max-width: 600px) {
    .modal-inner { flex-direction: column; }
    .modal-poster { width: 100%; aspect-ratio: 16/9; border-radius: 14px 14px 0 0; object-fit: cover; }
    .modal-poster-placeholder { width: 100%; height: 140px; border-radius: 14px 14px 0 0; }
    .modal-info { padding: 16px; }
    .modal-title { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      SheetApp
      <span>Minha Coleção de Filmes</span>
    </div>
    <div class="mode-toggle" id="mode-toggle">
<div class="mode-toggle" id="mode-toggle"><button class="mode-btn active" id="mode-generos" onclick="switchMode('generos')">Gênero</button><button class="mode-btn" id="mode-franquia" onclick="switchMode('franquia')">Franquia</button><button class="mode-btn" id="mode-colecoes" onclick="switchMode('colecoes')">Coleções</button></div>
    </div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">
      <span class="icon" id="theme-icon">🌙</span>
      <span id="theme-label">Tema Escuro</span>
    </button>
  </div>
  <div class="tabs-wrap">
    <button class="tabs-arrow" id="tabs-arrow-left" onclick="scrollTabs(-1)" aria-label="Voltar">‹</button>
    <nav class="tabs" id="tabs"></nav>
    <button class="tabs-arrow" id="tabs-arrow-right" onclick="scrollTabs(1)" aria-label="Avançar">›</button>
  </div>
</header>

<div class="toolbar">
  <span class="sort-label">Ordenar:</span>
  <button class="sort-btn" id="btn-ordem" onclick="sortBy('ordem')">Ordem da Coleção</button>
  <button class="sort-btn active" onclick="sortBy('nome-az')" id="btn-nome-az">Nome A→Z</button>
  <button class="sort-btn" onclick="sortBy('nome-za')" id="btn-nome-za">Nome Z→A</button>
  <button class="sort-btn" onclick="sortBy('ano-asc')" id="btn-ano-asc">Ano ↑</button>
  <button class="sort-btn" onclick="sortBy('ano-desc')" id="btn-ano-desc">Ano ↓</button>
  <span class="film-count" id="film-count"></span>
</div>

<main class="grid" id="grid"></main>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal(null, true)">✕</button>
    <div class="modal-inner" id="modal-inner"></div>
  </div>
</div>

<script src="filmes.js"></script>

// ── ESTADO ────────────────────────────────────────────────────────────────────
const GENRE_SHEETS = ["Clássicos","Ação","Comédia","Drama","Romance","Musicais","Suspense","Policial","Cult-Favoritos","Filmes Família"];
const CINE_ITALIA_TAB = "Cine Itália";
const GENEROS_TABS = [...GENRE_SHEETS, CINE_ITALIA_TAB];
let currentMode = "generos"; let currentTab = GENEROS_TABS[0]; let currentSort = "genero"; let isDark = false;
function getListForGenero(tab){ if(tab===CINE_ITALIA_TAB) return filmes.filter(f=>f.origem==="cine_italia"); return filmes.filter(f=>f.origem==="genero"&&f.genero===tab); }
function buildFranquias(){ const map={}; filmes.forEach(f=>{ if(f.origem!=="genero") return; (f.tags||[]).forEach(t=>{ if(t.tipo!=="Franquia") return; if(!map[t.nome]) map[t.nome]=[]; map[t.nome].push(f); }); }); return map; }
const FRANQUIAS = buildFranquias(); const FRANQUIA_NAMES = Object.keys(FRANQUIAS).sort((a,b)=>a.localeCompare(b,'pt'));
function buildColecoes(){ const map={}; filmes.forEach(f=>{ (f.tags||[]).forEach(t=>{ if(t.tipo!=="Coleção") return; if(!map[t.raw]) map[t.raw]=[]; map[t.raw].push(f); }); }); return map; }
const COLECOES = buildColecoes(); const COLECAO_KEYS = Object.keys(COLECOES).sort((a,b)=>displayColecaoName(a).localeCompare(displayColecaoName(b),'pt'));
function displayColecaoName(raw){ return raw.replace(/^Coleção\s+/, ''); }
function getList(){ if(currentMode==='franquia') return FRANQUIAS[currentTab]||[]; if(currentMode==='colecoes') return COLECOES[currentTab]||[]; return getListForGenero(currentTab); }
function getTabNames(){ if(currentMode==='franquia') return FRANQUIA_NAMES; if(currentMode==='colecoes') return COLECAO_KEYS; return GENEROS_TABS; }
function tabLabel(tab){ return currentMode==='colecoes' ? displayColecaoName(tab) : tab; }
function toggleTheme(){ isDark=!isDark; document.documentElement.setAttribute('data-theme', isDark?'dark':'light'); document.body.style.backgroundImage = isDark?'':`url('${SKY_URL}')`; document.getElementById('theme-icon').textContent = isDark?'☀️':'🌙'; document.getElementById('theme-label').textContent = isDark?'Tema Claro':'Tema Escuro'; }
function switchMode(mode){ if(mode===currentMode) return; currentMode=mode; document.getElementById('mode-generos').classList.toggle('active', mode==='generos'); document.getElementById('mode-franquia').classList.toggle('active', mode==='franquia'); document.getElementById('mode-colecoes').classList.toggle('active', mode==='colecoes'); const tabs=getTabNames(); currentTab=tabs[0]||''; currentSort = mode==='generos'?'genero':'ordem'; document.getElementById('btn-ordem').style.display = mode==='generos'?'none':''; document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active')); const activeBtn=document.getElementById('btn-'+currentSort); if(activeBtn) activeBtn.classList.add('active'); renderTabs(); renderGrid(); }
function renderTabs(){ const tabs=getTabNames(); document.getElementById('tabs').innerHTML = tabs.map(t=>`<button class="tab${t===currentTab?' active':''}" onclick="switchTab('${t.replace(/'/g,"\\'")}')">${tabLabel(t)}</button>`).join(''); document.getElementById('tabs').scrollLeft=0; updateTabsArrows(); }
function scrollTabs(dir){ const el=document.getElementById('tabs'); el.scrollBy({left:dir*260,behavior:'smooth'}); }
function updateTabsArrows(){ const el=document.getElementById('tabs'); const left=document.getElementById('tabs-arrow-left'); const right=document.getElementById('tabs-arrow-right'); const maxScroll=el.scrollWidth-el.clientWidth; left.disabled=el.scrollLeft<=2; right.disabled=el.scrollLeft>=maxScroll-2; }
function switchTab(tab){ currentTab=tab; renderTabs(); renderGrid(); }
function sortBy(key){ currentSort=key; document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active')); document.getElementById('btn-'+key).classList.add('active'); renderGrid(); }
function franquiaTagNome(f){ const tag=(f.tags||[]).find(t=>t.tipo==='Franquia'); return tag?tag.nome:null; }
function sortOrdemComFallback(data){ return [...data].sort((a,b)=>{ const oa=(a.ordem===undefined||a.ordem===null||a.ordem==='')?null:String(a.ordem); const ob=(b.ordem===undefined||b.ordem===null||b.ordem==='')?null:String(b.ordem); if(oa!==null&&ob!==null){ const c=oa.localeCompare(ob,'pt'); if(c!==0) return c; } else if(oa!==null){ return -1; } else if(ob!==null){ return 1; } return String(a.nome).localeCompare(String(b.nome),'pt'); }); }
function sortGeneroAgrupado(data){ return [...data].sort((a,b)=>{ const fa=franquiaTagNome(a); const fb=franquiaTagNome(b); const ka=fa||a.nome; const kb=fb||b.nome; const cmp=String(ka).localeCompare(String(kb),'pt'); if(cmp!==0) return cmp; if(fa&&fb){ const oa=a.ordem||''; const ob=b.ordem||''; const ocmp=String(oa).localeCompare(String(ob),'pt'); if(ocmp!==0) return ocmp; } return String(a.nome).localeCompare(String(b.nome),'pt'); }); }
function getSorted(data){ const d=[...data]; if(currentSort==='genero') return sortGeneroAgrupado(d); if(currentSort==='nome-az') return d.sort((a,b)=>String(a.nome).localeCompare(String(b.nome),'pt')); if(currentSort==='nome-za') return d.sort((a,b)=>String(b.nome).localeCompare(String(a.nome),'pt')); if(currentSort==='ano-asc') return d.sort((a,b)=>a.ano-b.ano); if(currentSort==='ano-desc') return d.sort((a,b)=>b.ano-a.ano); if(currentSort==='ordem') return sortOrdemComFallback(d); return d; }
function noImgHTML(){ return '<div class="no-img"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"></rect><path d="M8 21h8M12 17v4"></path></svg>Sem capa</div>'; }
function renderGrid(){ const grid=document.getElementById('grid'); const films=getSorted(getList()); document.getElementById('film-count').textContent = films.length?`${films.length} filme${films.length>1?'s':''}`:''; if(!films.length){ grid.innerHTML=`<div style="grid-column:1/-1;color:var(--muted);text-align:center;padding:60px 0;font-size:14px;">Nenhum filme nesta guia ainda.</div>`; return; } grid.innerHTML = films.map((f,i)=>{ const nome=String(f.nome); const perfilCor=(f.perfilCor||'').trim(); const hdr=perfilCor?`<span class="badge badge-hdr">${perfilCor}</span>`:''; const codec=f.codec?`<span class="badge badge-hdr2">${f.codec}</span>`:''; const generoBadge=(currentMode!=='generos'&&f.genero)?`<span class="badge badge-genero">${f.genero}</span>`:''; const nomeOriginal=f.nomeOriginal?`<div class="card-title-original">${f.nomeOriginal}</div>`:''; const img=f.capa?`<img src="${f.capa}" alt="${nome}" loading="lazy" onerror="this.parentElement.innerHTML=noImgHTML()">`:noImgHTML(); return `<div class="card" onclick="openModal(${i})"><div class="card-img-wrap">${img}<div class="card-hdr">${generoBadge}${hdr}${codec}</div><div class="card-overlay"></div></div><div class="card-body"><div class="card-title">${nome}</div>${nomeOriginal}<div class="card-year">${f.ano}</div></div></div>`; }).join(''); }
function tagChips(f){ return (f.tags||[]).filter(t=>t.tipo==='Franquia'||t.tipo==='Coleção').map(t=>{ const label=t.tipo==='Coleção'?displayColecaoName(t.nome):t.nome; const action=t.tipo==='Franquia'?`abrirFranquia('${t.nome.replace(/'/g,"\\'")}')`:`abrirColecao('${t.raw.replace(/'/g,"\\'")}')`; return `<span class="meta-chip colecao" onclick="${action}">${label}</span>`; }).join(''); }
function openModal(sortedIndex){ const films=getSorted(getList()); const f=films[sortedIndex]; if(!f) return; const poster=f.capa?`<img class="modal-poster" src="${f.capa}" alt="${f.nome}">`:`<div class="modal-poster-placeholder" style="aspect-ratio:2/3"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>`; const chips=[ f.ano?`<span class="meta-chip"><strong>${f.ano}</strong></span>`:'', f.duracao?`<span class="meta-chip">${f.duracao}</span>`:'', f.gb?`<span class="meta-chip"><strong>${f.gb} GB</strong></span>`:'', f.codec?`<span class="meta-chip">${f.codec}</span>`:'', f.perfilCor?`<span class="meta-chip">${f.perfilCor}</span>`:'', f.situacao?`<span class="meta-chip">${f.situacao}</span>`:'', (currentMode!=='generos'&&f.genero)?`<span class="meta-chip">${f.genero}</span>`:'', tagChips(f) ].join(''); const nomeOriginal=f.nomeOriginal?`<div class="modal-title-original">${f.nomeOriginal}</div>`:''; const sinopse=f.sinopse?`<div class="modal-sinopse">${f.sinopse}</div>`:''; const tech=[['Local',f.local],['Preset',f.presetElmedia]].filter(r=>r[1]).map(r=>`<div class="tech-row"><span class="k">${r[0]}</span><span class="v">${r[1]}</span></div>`).join(''); document.getElementById('modal-inner').innerHTML = `${poster}<div class="modal-info"><div class="modal-title">${String(f.nome)}</div>${nomeOriginal}<div class="modal-meta">${chips}</div>${sinopse}${tech?`<div class="modal-tech">${tech}</div>`:''}</div>`; document.getElementById('modal-overlay').classList.add('open'); document.body.style.overflow='hidden'; }
function abrirFranquia(nome){ closeModal(null,true); if(currentMode!=='franquia') switchMode('franquia'); switchTab(nome); }
function abrirColecao(raw){ closeModal(null,true); if(currentMode!=='colecoes') switchMode('colecoes'); switchTab(raw); }
function closeModal(e,force){ if(force||e.target===document.getElementById('modal-overlay')){ document.getElementById('modal-overlay').classList.remove('open'); document.body.style.overflow=''; } }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(null,true); });
document.getElementById('btn-ordem').style.display='none';
document.body.style.backgroundImage = `url('${SKY_URL}')`;
document.getElementById('tabs').addEventListener('scroll', updateTabsArrows);
window.addEventListener('resize', updateTabsArrows);
renderTabs();
renderGrid();
</script>
</body>
</html>
